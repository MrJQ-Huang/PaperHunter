version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./papers:/app/papers
      - ./data:/app/data
    env_file: .env
    environment:
      - DB_PATH=/app/data/papers.db
      - DOWNLOAD_DIR=/app/papers
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
